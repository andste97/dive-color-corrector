name: Release

on:
  push:
    tags:
      # Run whenever a new version tag is pushed, e.g. v1.0.0
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: dive-color-corrector-windows
            icon: logo/logo.ico
          - os: macos-latest
            artifact_name: dive-color-corrector-macos
            icon: logo/logo.icns
          - os: ubuntu-latest
            artifact_name: dive-color-corrector-linux
            icon: logo/logo.png

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system libraries for OpenCV
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller PySimpleGUI

      - name: Build executable
        run: pyinstaller -n "Dive Color Corrector" -F -w -i "${{ matrix.icon }}" dcc.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
